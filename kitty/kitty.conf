# ==============================================================================
# 🎨 COLORSCHEME & CURSOR (Your Custom Palette)
# ==============================================================================
background            #0C0B12
foreground            #bbb3e5
selection_background  #bbb3e5
selection_foreground  #0C0B12
cursor                #bbb3e5

color0                #0C0B12
color8                #827da0
color1                #554E66
color9                #554E66
color2                #9A5F5D
color10               #9A5F5D
color3                #524C90
color11               #524C90
color4                #665DAA
color12               #665DAA
color5                #665CB4
color13               #665CB4
color6                #8B75A9
color14               #8B75A9
color7                #bbb3e5
color15               #bbb3e5

confirm_os_window_close 0

# Sleek text cursor behavior & trail effect
cursor_shape                 block
cursor_blink_interval        0.5
cursor_trail                 1
cursor_trail_decay           0.1 0.4
cursor_trail_start_threshold 0

# ==============================================================================
# 🚀 VISUAL EYE CANDY & WINDOW DECORATIONS
# ==============================================================================
hide_window_decorations      no
window_padding_width         12
disable_code_ligatures       never

# Premium typography layout
font_family                  JetBrainsMono Nerd Font
font_size                    16.0
adjust_line_height           110%

# Enable JetBrains Mono alternate zero and geometric features
font_features                JetBrainsMonoNF-Regular +zero +ss01 +ss02 +calt

# Subtle transparent backdrop with heavy blurring (requires a compositor)
background_opacity           0.95
background_blur              20

# Premium curly underlines for URLs and code linters
url_style                    curly
url_color                    #8B75A9
detect_urls                  yes
open_url_with                default
modify_font                  underline_position 2
modify_font                  underline_thickness 150%

# Split layout borders (Thin and color-coordinated)
draw_minimal_borders         yes
window_border_width          1.5pt
active_border_color          #8B75A9
inactive_border_color        #554E66

# ==============================================================================
# 📊 THE "NEOVIM" POWERLINE TAB BAR (Fixed & Right-Aligned)
# ==============================================================================
tab_bar_edge                 bottom
tab_bar_margin_width         0.0
tab_bar_margin_height        0.0 0.0
tab_bar_style                powerline
tab_powerline_style          slanted
tab_bar_align                left
tab_bar_min_tabs             2

# Clean, native formatting using your color palette blocks
tab_title_template           " {index}: {title} "

# Active Tab (High contrast using your foreground)
active_tab_foreground        #0C0B12
active_tab_background        #bbb3e5
active_tab_font_style        bold

# Inactive Tabs (Subtle purple/gray blocks)
inactive_tab_foreground      #bbb3e5
inactive_tab_background      #665DAA
inactive_tab_font_style      normal

# Fill space color
tab_bar_background           #0C0B12

# ==============================================================================
# 🛠️ ADVANCED WINDOW MANAGEMENT & SCROLLBACK
# ==============================================================================
# Enable multiple layouts so you can cycle or split dynamically
enabled_layouts              splits,stack,fat,tall

# Heavy-duty scrollback memory buffer
scrollback_lines             10000
scrollback_pager             less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ==============================================================================
# 🎹 MEMORABLE WORKFLOW KEYBINDS (Alt-Powered)
# ==============================================================================

# --- Window Splits (True Dynamic Splitting) ---
map alt+v launch --location=vsplit --cwd=current
map alt+h launch --location=hsplit --cwd=current

# --- Navigate Splits (Alt + Arrow Keys / Vim Keys) ---
map alt+left  neighboring_window left
map alt+right neighboring_window right
map alt+up    neighboring_window up
map alt+down  neighboring_window down
map alt+k     neighboring_window up
map alt+j     neighboring_window down
map alt+h     neighboring_window left
map alt+l     neighboring_window right

# --- Resize Window Splits (Ctrl + Alt + Arrow Keys) ---
map ctrl+alt+left  resize_window narrower 2
map ctrl+alt+right resize_window wider 2
map ctrl+alt+up    resize_window taller 2
map ctrl+alt+down  resize_window shorter 2

# --- Tab Management ---
map alt+t new_tab_with_cwd
map alt+w close_window
map alt+shift+w close_tab
map alt+[ previous_tab
map alt+] next_tab

# --- Direct Tab Jumping ---
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5

# --- Layout Modifications ---
map alt+z toggle_layout stack
map alt+/ layout_action rotate

# --- Font Scaling ---
map alt+= change_font_size all +1.0
map alt+- change_font_size all -1.0
map alt+0 change_font_size all 0

# ==============================================================================
# ⚡ ELITE GOD-MODE KITTEN SHORTCUTS (Keyboard Overlay Tools)
# ==============================================================================

# 🎯 Hint Mode: Highlight any file path on screen & instantly open it in Neovim
map alt+f kitten hints --type path --program "launch --type=overlay nvim"

# 📋 Hint Mode: Highlight any word/git-hash on screen and slam it right into your prompt
map alt+p kitten hints --type word --program insert

# 🔗 Hint Mode: Highlight any URL on screen and copy it straight to your clipboard
map alt+y kitten hints --type url --program @

# 📖 History: Instantly throw your entire terminal screen scrollback history into a pager
map alt+g show_scrollback

# ⌨️ Command Center: Open the native interactive Kitty command overlay shell
map alt+escape kitty_shell window

# ==============================================================================
# 🏎️ INSANE PERFORMANCE TUNING (True 210Hz Hardware Optimization)
# ==============================================================================
# Force kitty to sync perfectly with your display hardware cycles to kill stuttering
sync_to_monitor              yes

# 1000ms / 210Hz = ~4.7ms frame time. 4ms ensures rendering outpaces the monitor.
repaint_delay                4

# Keeps standard input processing completely instantaneous
input_delay                  1

# Maximize system rendering environment
linux_display_server         auto
