# ==============================================================================
# 🎨 CATPPUCCIN MOCHA - DESKTOP i3BLOCKS CONFIG
# ==============================================================================

separator=false
markup=pango
color=#CDD6F4

# ------------------------------------------------------------------------------
# 🚀 QUICK LAUNCHERS (Far Left)
# ------------------------------------------------------------------------------


# ------------------------------------------------------------------------------
# 🛠️ SYSTEM MONITORING
# ------------------------------------------------------------------------------

[memory]
label=    
command=FORCE_COLOR=1 ~/.config/i3/scripts/memory
interval=2
color=#BAC2DE

[cpu_usage]
label=    
command=FORCE_COLOR=1 ~/.config/i3/scripts/cpu_usage
interval=2
color=#A6E3A1

[CPU-temperature]
label=  -   
command=FORCE_COLOR=1 ~/.config/i3/scripts/temperature
interval=30
color=#F9E2AF

# ------------------------------------------------------------------------------
# 🔊 AUDIO & UTILITIES
# ------------------------------------------------------------------------------


[volume]
label=  -    
command=FORCE_COLOR=1 ~/.config/i3/scripts/volume
interval=2
color=#CDD6F4

[keybindings]
full_text=        
color=#F5C2E7
command=~/.config/i3/scripts/keyhint

# ------------------------------------------------------------------------------
# 📅 TIME & POWER (Far Right)
# ------------------------------------------------------------------------------

[time]
command=date '+%a %d %b  %H:%M:%S'
interval=1
color=#F9E2AF

[shutdown_menu]
full_text=   
color=#F38BA8
command=~/.config/i3/scripts/powermenu
